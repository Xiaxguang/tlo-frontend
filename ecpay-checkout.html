<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=yes">
  <title>TLO 綠界付款</title>
  <style>
    html, body { margin:0; padding:0; background:#fff; color:#111; font-family: Arial, "Noto Sans TC", sans-serif; }
    .wrap { padding:10px; box-sizing:border-box; }
    #ECPayPayment { min-height:330px; }
    #btnPay { width:100%; margin-top:10px; border:0; border-radius:12px; padding:13px 14px; font-weight:900; color:#fff; background:linear-gradient(45deg,#7f00ff,#00fff0); cursor:pointer; }
    #btnPay:disabled { opacity:.55; cursor:not-allowed; }
    #msg { font-size:13px; line-height:1.6; margin-top:8px; color:#333; word-break:break-word; }
    .ok { color:#008a4b; font-weight:900; }
    .bad { color:#d10000; font-weight:900; }
    .hint { color:#555; font-size:12px; margin-top:5px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="ECPayPayment"></div>
    <button id="btnPay" type="button" disabled>付款畫面載入中...</button>
    <div id="msg">正在準備綠界付款頁面...</div>
    <div class="hint">填完資料後，請按上方按鈕送出付款或取得繳費代碼。</div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/node-forge@0.7.0/dist/forge.min.js"></script>
  <script>
    var order = null;
    var rendered = false;
    function parentPost(payload) {
      try { window.parent && window.parent.postMessage(payload, '*'); } catch(e) {}
    }
    function setMsg(text, good) {
      var el = document.getElementById('msg');
      if (el) el.innerHTML = '<span class="' + (good ? 'ok' : 'bad') + '">' + String(text || '').replace(/[&<>"']/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]); }) + '</span>';
    }
    function setBtn(enabled, text) {
      var btn = document.getElementById('btnPay');
      if (!btn) return;
      btn.disabled = !enabled;
      btn.textContent = text || (enabled ? '送出付款 / 取得繳費代碼' : '付款畫面載入中...');
    }
    function loadScript(src, cb, fail) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = function(){ cb && cb(); };
      s.onerror = function(){ fail && fail(new Error('綠界 SDK 載入失敗：' + src)); };
      document.body.appendChild(s);
    }
    function parseOrder() {
      try {
        var raw = decodeURIComponent((window.location.hash || '').replace(/^#/, ''));
        order = JSON.parse(raw || '{}');
      } catch(e) { order = null; }
      if (!order || !order.token) throw new Error('付款資料不完整，請重新建立訂單。');
      if (!order.ecpay || !order.ecpay.sdkUrl) throw new Error('綠界 SDK 網址遺失，請檢查後端設定。');
      parentPost({ type:'TLO_ECPAY_READY', orderNo: order.orderNo });
    }
    function initPayment() {
      try {
        var serverType = (order.ecpay && order.ecpay.serverType) || 'Stage';
        ECPay.initialize(serverType, 1, function(errMsg) {
          if (errMsg != null) {
            setMsg('綠界初始化失敗：' + errMsg, false);
            parentPost({ type:'TLO_ECPAY_ERROR', orderNo: order.orderNo, msg:'綠界初始化失敗：' + errMsg });
            return;
          }
          var lang = ECPay.Language && ECPay.Language.zhTW ? ECPay.Language.zhTW : 'zh-TW';
          ECPay.createPayment(order.token, lang, function(errMsg2) {
            if (errMsg2 != null) {
              setMsg('付款畫面建立失敗：' + errMsg2, false);
              parentPost({ type:'TLO_ECPAY_ERROR', orderNo: order.orderNo, msg:'付款畫面建立失敗：' + errMsg2 });
              return;
            }
            rendered = true;
            setBtn(true, '送出付款 / 取得繳費代碼');
            setMsg('付款畫面已載入，請選擇付款方式並填寫資料。', true);
            parentPost({ type:'TLO_ECPAY_RENDERED', orderNo: order.orderNo });
          }, 'V2');
        });
      } catch(e) {
        setMsg('綠界付款畫面發生錯誤：' + (e.message || e), false);
        parentPost({ type:'TLO_ECPAY_ERROR', orderNo: order && order.orderNo, msg:'綠界付款畫面發生錯誤：' + (e.message || e) });
      }
    }
    function submitPay() {
      if (!rendered || !window.ECPay || typeof ECPay.getPayToken !== 'function') {
        setMsg('綠界付款畫面尚未準備完成。', false);
        return;
      }
      setBtn(false, '處理付款中...');
      setMsg('正在取得付款代碼...', true);
      try {
        ECPay.getPayToken(function(paymentInfo, errMsg) {
          if (errMsg != null) {
            setBtn(true, '送出付款 / 取得繳費代碼');
            setMsg('取得付款代碼失敗：' + errMsg, false);
            parentPost({ type:'TLO_ECPAY_ERROR', orderNo: order.orderNo, msg:'取得付款代碼失敗：' + errMsg });
            return;
          }
          if (!paymentInfo || !paymentInfo.PayToken) {
            setBtn(true, '送出付款 / 取得繳費代碼');
            setMsg('取得付款代碼失敗，請確認付款資料是否填寫完整。', false);
            return;
          }
          setMsg('付款代碼已取得，正在送出交易...', true);
          parentPost({ type:'TLO_ECPAY_PAYTOKEN', orderNo: order.orderNo, paymentInfo: paymentInfo });
        });
      } catch(e) {
        setBtn(true, '送出付款 / 取得繳費代碼');
        setMsg('取得付款代碼發生錯誤：' + (e.message || e), false);
      }
    }
    document.getElementById('btnPay').addEventListener('click', submitPay);
    window.addEventListener('message', function(ev){
      var data = ev.data || {};
      if (data.type === 'TLO_ECPAY_REQUEST_PAY') submitPay();
    });
    try {
      parseOrder();
      loadScript(order.ecpay.sdkUrl, initPayment, function(err){
        setMsg(err.message || err, false);
        parentPost({ type:'TLO_ECPAY_ERROR', orderNo: order.orderNo, msg: err.message || String(err) });
      });
    } catch(e) {
      setMsg(e.message || e, false);
      parentPost({ type:'TLO_ECPAY_ERROR', orderNo: order && order.orderNo, msg: e.message || String(e) });
    }
  </script>
</body>
</html>
